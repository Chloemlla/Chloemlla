name: Fork Sync

on:
  schedule:
    # Daily 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no branch writes, no PR, no email)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: fork-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Scan forks and sync upstream
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run fork-sync
        env:
          # Prefer existing repo secret USER_PAT (classic/fine-grained PAT with repo scope)
          GH_PAT: ${{ secrets.USER_PAT }}
          OUTEMAIL_API_KEY: ${{ secrets.OUTEMAIL_API_KEY }}
          OUTEMAIL_BASE_URL: ${{ vars.OUTEMAIL_BASE_URL || 'https://tts.chloemlla.com' }}
          REPORT_TO: ${{ vars.REPORT_TO || 'happyclovo@gmail.com' }}
          MERGE_METHOD: ${{ vars.MERGE_METHOD || 'merge' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' && '1' || '0' }}
        run: node scripts/fork-sync.mjs
